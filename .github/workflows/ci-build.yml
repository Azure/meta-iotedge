name: Yocto build

on:
  pull_request:
    branches:
      - main
      - kirkstone
  push:
    branches:
      - main
      - kirkstone
  workflow_dispatch:
    inputs:
      skip_qemu:
        description: "Skip QEMU validation (faster, packages only)"
        type: boolean
        default: false
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout (tag or branch)"
        type: string
        required: false
      skip_qemu:
        description: "Skip QEMU validation"
        type: boolean
        default: false
    outputs:
      template:
        description: "Template used for build"
        value: ${{ jobs.check-changes.outputs.template }}

permissions:
  contents: read
  packages: read

concurrency:
  group: yocto-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-changes:
    name: Check if only docs changed
    runs-on: ubuntu-22.04
    outputs:
      docs_only: ${{ steps.docs-only.outputs.docs_only }}
      template: ${{ steps.set-template.outputs.template }}
      templates: ${{ steps.set-matrix.outputs.templates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}
          fetch-depth: 0

      - name: Check if only docs changed
        id: docs-only
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, check files changed in the PR
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            # For pushes, check files in the last commit
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only --diff-filter=A HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if all changed files are documentation-related
          DOCS_ONLY=true
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files changed"
            DOCS_ONLY=false
          else
            while IFS= read -r file; do
              # Skip empty lines
              [ -z "$file" ] && continue
              if [[ ! "$file" =~ \.(md|MD)$ ]] && \
                 [[ ! "$file" =~ ^docs/ ]] && \
                 [[ "$file" != "LICENSE" ]] && \
                 [[ "$file" != "SECURITY.md" ]] && \
                 [[ "$file" != "THIRDPARTYNOTICES" ]]; then
                DOCS_ONLY=false
                break
              fi
            done <<< "$CHANGED_FILES"
          fi
          
          echo "docs_only=$DOCS_ONLY" >> "$GITHUB_OUTPUT"
          if [ "$DOCS_ONLY" = "true" ]; then
            echo "Only documentation files changed - skipping build"
          else
            echo "Code files changed - running full build"
          fi

      - name: Determine template from branch or tag
        id: set-template
        run: |
          # Tag-triggered builds (releases) pick the Yocto template from the
          # IoT Edge version: 1.6.x -> Wrynose, 1.5.x -> Scarthgap. Branch
          # builds map kirkstone -> kirkstone, everything else -> scarthgap.
          REF="${{ inputs.ref || github.base_ref || github.ref_name }}"
          case "$REF" in
            1.6.*) echo "template=wrynose" >> "$GITHUB_OUTPUT" ;;
            1.5.*) echo "template=scarthgap" >> "$GITHUB_OUTPUT" ;;
            kirkstone) echo "template=kirkstone" >> "$GITHUB_OUTPUT" ;;
            *) echo "template=scarthgap" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Determine build matrix (templates to build)
        id: set-matrix
        run: |
          # The build job runs as a matrix over Yocto templates so the green
          # "Build and validate" check reflects every line we ship.
          #
          # Release tags (release.yml passes inputs.ref = 1.5.* / 1.6.*) build
          # ONLY that line's template, so we don't double-build a release or
          # build the wrong line (e.g. wrynose for a 1.5 tag). PR and push
          # builds, which is where recipe changes land, build BOTH LTS lines
          # (scarthgap = 1.5, wrynose = 1.6) so a passing check means both
          # lines fetch, build, and boot. kirkstone is intentionally left out
          # of the PR matrix: it shares the 1.5 recipe with scarthgap, so a
          # third leg adds cost without testing a distinct recipe shape.
          #
          # A tag is detected from inputs.ref (workflow_call from release.yml)
          # or github.ref_type. Branch/PR events fall through to both lines.
          REF="${{ inputs.ref || github.ref_name }}"
          IS_TAG="false"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            IS_TAG="true"
          fi
          case "$REF" in
            1.5.*|1.6.*) IS_TAG="true" ;;
          esac

          if [ "$IS_TAG" = "true" ]; then
            # Single template, matching the release line.
            templates="[\"${{ steps.set-template.outputs.template }}\"]"
          else
            # Double-build both LTS lines on PR/push.
            templates='["scarthgap","wrynose"]'
          fi
          echo "templates=${templates}" >> "$GITHUB_OUTPUT"
          echo "Build matrix templates: ${templates}"

  check-recipes:
    name: Recipe consistency check
    needs: check-changes
    if: needs.check-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Extract IoT Edge release version from committed recipes
        id: version
        run: |
          # Find the version-specific .inc file (excludes -crates.inc)
          inc_file=$(ls recipes-core/iotedge/iotedge-[0-9]*.inc 2>/dev/null | head -1)
          if [[ -z "${inc_file}" ]]; then
            echo "No iotedge version .inc found — skipping idempotency check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Extract the release tag (IOTEDGE_RELEASE) from the .inc file.
          # This may differ from the recipe filename version when a release
          # only updates Docker images (e.g. release 1.5.35, daemon 1.5.21).
          ver=$(grep 'IOTEDGE_RELEASE' "${inc_file}" | sed 's/.*= *"//;s/".*//' || true)
          if [[ -z "${ver}" ]]; then
            # Fallback for older recipes without IOTEDGE_RELEASE:
            # use the recipe filename version (same as release when daemon == release)
            bb_file=$(ls recipes-core/iotedge/iotedge_*.bb 2>/dev/null | head -1)
            ver=$(basename "${bb_file}" | sed 's/^iotedge_//;s/\.bb$//')
          fi
          echo "iotedge_version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Detected IoT Edge release version: ${ver}"

      - name: Regenerate recipes
        if: ${{ steps.version.outputs.skip != 'true' }}
        run: |
          ./scripts/update-recipes.sh \
            --iotedge-version "${{ steps.version.outputs.iotedge_version }}" \
            --skip-validate

      - name: Check for drift between generated and committed recipes
        if: ${{ steps.version.outputs.skip != 'true' }}
        run: |
          if ! git diff --exit-code recipes-core/; then
            echo ""
            echo "::error::Generated recipes differ from committed files."
            echo "Run './scripts/update-recipes.sh --iotedge-version ${{ steps.version.outputs.iotedge_version }}' and commit the results."
            exit 1
          fi
          echo "✓ Committed recipes match generated output"

  build:
    name: Build and validate
    needs: [check-changes, check-recipes]
    if: needs.check-changes.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        # PR/push builds both LTS lines (scarthgap = 1.5, wrynose = 1.6);
        # release tags collapse to the single matching template. See the
        # set-matrix step in check-changes.
        template: ${{ fromJSON(needs.check-changes.outputs.templates) }}
    runs-on:
    - self-hosted
    - 1ES.Pool=meta-iotedge-1es-github-linux-amd64
    - 1ES.ImageOverride=agent-aziotedge-ubuntu-22.04-msmoby
    outputs:
      template: ${{ needs.check-changes.outputs.template }}
    container:
      # The devcontainer image is Yocto-release-agnostic: it provides host
      # build tools only, and OE-core fetches the per-template uninative +
      # cross toolchain at build time. So a single neutral :latest tag serves
      # every matrix leg; the real Yocto line comes from matrix.template,
      # which is passed to fetch.sh / build.sh / validate-qemu.sh below.
      image: ghcr.io/azure/meta-iotedge-devcontainer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root -v ${{ vars.YOCTO_CACHE_PATH || '/var/cache/yocto' }}:/workspaces/yocto-cache
    env:
      DEVCONTAINER: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Configure git safe directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder /workspaces/yocto-cache

      - name: Fix permissions
        run: chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Show cache status
        run: |
          echo "Sstate cache: $(du -sh /workspaces/yocto-cache/sstate-cache 2>/dev/null | cut -f1 || echo 'empty')"
          echo "Downloads: $(du -sh /workspaces/yocto-cache/downloads 2>/dev/null | cut -f1 || echo 'empty')"

      - name: Fetch layers
        run: sudo -E -u builder ./scripts/fetch.sh "${{ matrix.template }}"

      - name: Build
        env:
          TEMPLATE: ${{ matrix.template }}
        run: |
          if [[ "${{ inputs.skip_qemu }}" == "true" ]]; then
            sudo -E -u builder ./scripts/build.sh "${TEMPLATE}"
          else
            sudo -E -u builder ./scripts/build.sh "${TEMPLATE}" --with-qemu
          fi

      - name: Run QEMU validation
        if: ${{ !inputs.skip_qemu }}
        run: sudo -E -u builder ./scripts/validate-qemu.sh "${{ matrix.template }}"

      - name: Collect IoT Edge RPM packages
        id: collect-rpms
        run: |
          mkdir -p rpm-staging
          find build/tmp/deploy/rpm -type f -name "*.rpm" \( \
            -name "iotedge-*.rpm" -o \
            -name "aziot-*.rpm" \) \
            -exec cp {} rpm-staging/ \;
          echo "IoT Edge RPMs:"
          ls -la rpm-staging/

      - name: Upload RPM packages
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages-${{ matrix.template }}
          path: rpm-staging/*.rpm
          retention-days: 7
          if-no-files-found: warn

      - name: Upload QEMU image
        if: ${{ !inputs.skip_qemu }}
        uses: actions/upload-artifact@v4
        with:
          name: iotedge-qemu-image-${{ matrix.template }}
          path: |
            build/tmp/deploy/images/qemux86-64/iotedge-qemu-image-qemux86-64.rootfs.ext4
            build/tmp/deploy/images/qemux86-64/bzImage
          retention-days: 7
          if-no-files-found: warn

  status-check:
    name: Status check
    runs-on: ubuntu-22.04
    needs: [check-changes, check-recipes, build]
    if: always()
    steps:
      - name: Determine overall status
        run: |
          # needs.build.result is the AGGREGATE of every matrix leg: GitHub
          # reports 'success' only when ALL legs (scarthgap and wrynose on a
          # PR/push) succeed, and 'failure' if any single leg fails. So this
          # check fails the moment one line fails to build or boot, which is
          # what makes the green check honest across both LTS lines.
          if [ "${{ needs.check-changes.outputs.docs_only }}" == "true" ]; then
            echo "✓ Docs-only change - no build required"
            exit 0
          elif [ "${{ needs.check-recipes.result }}" != "success" ]; then
            echo "✗ Recipe consistency check failed"
            exit 1
          elif [ "${{ needs.build.result }}" == "success" ]; then
            echo "✓ Build succeeded for all templates"
            exit 0
          else
            echo "✗ Build failed or was cancelled (one or more templates)"
            exit 1
          fi
