name: Release

on:
  push:
    tags:
      - "1.5.*"
      - "1.6.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., 1.5.40 or 1.6.0-rc.1)"
        required: true

permissions:
  contents: write
  packages: read

jobs:
  # Call the CI workflow to build and validate
  build:
    name: Build and validate
    uses: ./.github/workflows/ci-build.yml
    with:
      ref: ${{ inputs.tag || github.ref_name }}
      skip_qemu: false
    secrets: inherit

  # Create release after successful build and validation
  release:
    name: Create release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Check out release tag and history
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Download RPM packages
        uses: actions/download-artifact@v8
        with:
          name: rpm-packages-${{ needs.build.outputs.template }}
          path: release-artifacts/rpm

      - name: Download QEMU image
        uses: actions/download-artifact@v8
        with:
          name: iotedge-qemu-image-${{ needs.build.outputs.template }}
          path: release-artifacts/qemu

      - name: Prepare release artifacts
        id: artifacts
        run: |
          mkdir -p final-artifacts rpm-staging
          VERSION="${{ inputs.tag || github.ref_name }}"
          
          # Only include IoT Edge specific RPMs (not all dependencies)
          find release-artifacts/rpm -type f -name "*.rpm" \( \
            -name "iotedge-*.rpm" -o \
            -name "aziot-*.rpm" \) \
            -exec cp {} rpm-staging/ \;
          
          echo "IoT Edge RPMs to include:"
          ls -la rpm-staging/
          
          # Create tarball of just the IoT Edge packages
          tar -czvf "final-artifacts/iotedge-rpms-${VERSION}.tar.gz" -C rpm-staging .
          
          # Compress QEMU rootfs
          if [[ -f release-artifacts/qemu/iotedge-qemu-image-qemux86-64.rootfs.ext4 ]]; then
            zstd -T0 -19 release-artifacts/qemu/iotedge-qemu-image-qemux86-64.rootfs.ext4 \
              -o final-artifacts/iotedge-qemu-image-qemux86-64.rootfs.ext4.zst
          fi
          
          # Copy kernel
          cp release-artifacts/qemu/bzImage final-artifacts/ 2>/dev/null || true
          
          echo "Release artifacts:"
          ls -la final-artifacts/
          
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata and notes
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.artifacts.outputs.version }}"
          case "$VERSION" in
            1.5.*)
              SERIES="1.5"
              YOCTO="Scarthgap"
              TEMPLATE="scarthgap"
              RELEASE_SUMMARY="This is a maintenance release for the **Scarthgap (Yocto 5.0) / IoT Edge 1.5.x** line. It is not a downgrade from a 1.6.x release."
              ;;
            1.6.*-scarthgap|1.6.*-scarthgap.*)
              # IoT Edge 1.6 built on Yocto 5.0 (Scarthgap) via the
              # scarthgap-1.6 template + meta-lts-mixins Rust, for customers who
              # need 1.6 before they can move to Wrynose (6.0). Shares the 1.6.x
              # daemon/recipes with the Wrynose line; the '-scarthgap' tag
              # suffix is what selects this Yocto line.
              SERIES="1.6"
              YOCTO="Scarthgap"
              TEMPLATE="scarthgap-1.6"
              RELEASE_SUMMARY="This release delivers **IoT Edge 1.6.x on Yocto 5.0 (Scarthgap)**, for devices that need 1.6 before moving to Wrynose (Yocto 6.0). It uses the same 1.6.x daemon as the Wrynose line."
              ;;
            1.6.*)
              SERIES="1.6"
              YOCTO="Wrynose"
              TEMPLATE="wrynose"
              RELEASE_SUMMARY="This release belongs to the **Wrynose (Yocto 6.0) / IoT Edge 1.6.x** line."
              ;;
            *)
              echo "Unsupported release tag: $VERSION" >&2
              exit 1
              ;;
          esac

          if [[ "$VERSION" == *-rc* || "$VERSION" == *-beta* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          # Distinguish the secondary Scarthgap-1.6 line from the primary
          # Wrynose 1.6 line. Both are SERIES=1.6, but Scarthgap-1.6 is a
          # compatibility line: it must never take the "Latest" badge from the
          # primary Wrynose release, and its release notes / previous-tag
          # comparison must stay within its own '-scarthgap'-suffixed tags.
          if [[ "$TEMPLATE" == "scarthgap-1.6" ]]; then
            IS_SCARTHGAP_16=true
          else
            IS_SCARTHGAP_16=false
          fi

          # GitHub otherwise compares generated notes against the most recently
          # published release, which may be from the other supported release line.
          # Configure Git's version sort so prereleases sort before their stable
          # release, while numeric Yocto-layer revisions sort after it:
          # beta < rc < stable < -1 < -2. Limit candidates to ancestors of the
          # checked-out tag so manually rerunning an older release can't select
          # a newer tag as its comparison base. Scope the tag glob to the Yocto
          # line so a Wrynose 1.6 release does not compare against a Scarthgap-1.6
          # tag (or vice versa): Scarthgap-1.6 uses '1.6.*-scarthgap*', Wrynose
          # 1.6 uses '1.6.*' with the '-scarthgap' tags filtered out.
          if [[ "$IS_SCARTHGAP_16" == "true" ]]; then
            TAG_GLOB="1.6.*-scarthgap*"
            TAG_FILTER="cat"
          elif [[ "$SERIES" == "1.6" ]]; then
            TAG_GLOB="1.6.*"
            TAG_FILTER="grep -v -- -scarthgap"
          else
            TAG_GLOB="${SERIES}.*"
            TAG_FILTER="cat"
          fi
          PREVIOUS_TAG="$(git \
            -c versionsort.suffix=-beta \
            -c versionsort.suffix=-rc \
            -c versionsort.suffix= \
            tag --list "${TAG_GLOB}" --merged=HEAD --sort=-version:refname \
            | grep -Fxv "$VERSION" \
            | ${TAG_FILTER} \
            | head -n 1 || true)"

          # Before 1.6 GA, 1.5 remains the latest stable line. After 1.6 GA,
          # later 1.5 maintenance releases must not move Latest back to 1.5.
          # "1.6 GA" here means a Wrynose (primary-line) stable release, so the
          # startswith check excludes '-scarthgap' compatibility tags.
          HAS_STABLE_16="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq 'any(.[]; .draft == false and .prerelease == false and (.tag_name | startswith("1.6.")) and (.tag_name | contains("-scarthgap") | not))')"
          if [[ "$SERIES" == "1.6" && "$PRERELEASE" == "false" && "$IS_SCARTHGAP_16" == "false" ]]; then
            HAS_STABLE_16=true
          fi

          # Latest badge: only the primary Wrynose 1.6 stable line earns it.
          # Scarthgap-1.6 is a compatibility line and is never Latest, so it
          # can't override the Wrynose GA badge.
          if [[ "$PRERELEASE" == "true" ]]; then
            MAKE_LATEST=false
          elif [[ "$IS_SCARTHGAP_16" == "true" ]]; then
            MAKE_LATEST=false
          elif [[ "$SERIES" == "1.6" ]]; then
            MAKE_LATEST=true
          elif [[ "$HAS_STABLE_16" == "true" ]]; then
            MAKE_LATEST=false
          else
            MAKE_LATEST=true
          fi

          {
            echo "series=$SERIES"
            echo "yocto=$YOCTO"
            echo "template=$TEMPLATE"
            echo "prerelease=$PRERELEASE"
            echo "previous_tag=$PREVIOUS_TAG"
            echo "make_latest=$MAKE_LATEST"
          } >> "$GITHUB_OUTPUT"

          if [[ "$HAS_STABLE_16" == "true" ]]; then
            WRYNOSE_STATUS="Active and maintained"
          else
            WRYNOSE_STATUS="Active; latest release is a prerelease"
          fi

          cat > release-notes.md <<EOF
          ## ${YOCTO} release for IoT Edge ${SERIES}.x

          ${RELEASE_SUMMARY}

          The repository maintains multiple release lines side by side:

          | Yocto release | IoT Edge line | Status |
          | --- | --- | --- |
          | Scarthgap (5.0) | 1.5.x | Active and supported through November 2026 |
          | Wrynose (6.0) | 1.6.x | ${WRYNOSE_STATUS} |
          | Scarthgap (5.0) | 1.6.x (\`-scarthgap\` tags) | IoT Edge 1.6 on Yocto 5.0, for devices not yet on Wrynose |

          Release tags select the line: \`1.5.x\` -> Scarthgap/1.5, \`1.6.x\` -> Wrynose/1.6, \`1.6.x-scarthgap\` -> Scarthgap/1.6. Choose the tag that matches your Yocto release.

          ## Build from source

          Most users should build from source using the recipes in this repository. The prebuilt RPMs below target \`qemux86-64\` and will not work on other hardware.

          \`\`\`bash
          git clone --branch ${VERSION} https://github.com/${GITHUB_REPOSITORY}.git
          cd meta-iotedge
          ./scripts/build.sh ${TEMPLATE}
          \`\`\`

          ## Prebuilt artifacts (qemux86-64 only)

          These artifacts are primarily for CI verification and testing.

          ### RPM packages

          \`\`\`bash
          tar -xzvf iotedge-rpms-${VERSION}.tar.gz
          \`\`\`

          Included: iotedge, aziot-edged, aziotd, aziotctl, aziot-keys.

          ### QEMU test image

          \`\`\`bash
          zstd -d iotedge-qemu-image-qemux86-64.rootfs.ext4.zst

          qemu-system-x86_64 \\
            -kernel bzImage \\
            -drive file=iotedge-qemu-image-qemux86-64.rootfs.ext4,format=raw \\
            -append "root=/dev/sda console=ttyS0" \\
            -nographic -m 512
          \`\`\`

          ## Documentation

          See the [README](https://github.com/${GITHUB_REPOSITORY}#readme) for build and integration instructions.

          > **Repository history note:** \`main\` contains both the Scarthgap/1.5.x and Wrynose/1.6.x recipes. Generated notes compare against the previous ${SERIES}.x tag, but the repository diff may still include changes for both release lines.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: IoT Edge Yocto Layer ${{ steps.artifacts.outputs.version }} (${{ steps.metadata.outputs.yocto }} / ${{ steps.metadata.outputs.series }}.x)
          draft: false
          prerelease: ${{ steps.metadata.outputs.prerelease }}
          make_latest: ${{ steps.metadata.outputs.make_latest }}
          generate_release_notes: true
          previous_tag: ${{ steps.metadata.outputs.previous_tag }}
          files: final-artifacts/*
          body_path: release-notes.md
