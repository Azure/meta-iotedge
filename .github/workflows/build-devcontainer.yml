name: Build devcontainer image

on:
  push:
    branches:
      - main
    paths:
      - '.devcontainer/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push devcontainer image
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase repo owner
        shell: bash
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: true
          # The devcontainer image is Yocto-release-agnostic: it only provides
          # host build tools, and OE-core fetches its own uninative + cross
          # toolchain per template at build time. So it carries ONE neutral
          # :latest tag rather than per-release tags. The build and
          # upstream-update workflows reference :latest for every Yocto line.
          #
          # :scarthgap is kept as a transitional alias for one publish cycle
          # so refs that still point at it during the rename keep working. It
          # can be dropped after this image is published once under :latest.
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/meta-iotedge-devcontainer:latest
            ghcr.io/${{ env.REPO_OWNER_LC }}/meta-iotedge-devcontainer:scarthgap
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_OWNER_LC }}/meta-iotedge-devcontainer:latest
          cache-to: type=inline
